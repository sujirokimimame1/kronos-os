<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kronos OS</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    p {
      color: #94a3b8;
    }

    .loader {
      margin-top: 20px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Kronos OS</h1>
    <p>Redirecionando para o sistema...</p>
    <div class="loader"></div>
  </div>

  <script>
    // redireciona automaticamente
    setTimeout(() => {
      window.location.href = "/solicitante";
    }, 1000);
  </script>
</body>
</html>
