<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kronos - Acesso do Solicitante</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
:root {
    --primary: #4FC3F7;
    --primary-dark: #29B6F6;
    --primary-light: #81D4FA;
    --primary-glow: rgba(79, 195, 247, 0.35);
    --secondary: #BA68C8;
    --secondary-glow: rgba(186, 104, 200, 0.25);
    --black: #0F172A;
    --black-light: #1E293B;
    --black-lighter: #334155;
    --light: #FFFFFF;
    --gray: #94A3B8;
    --card-bg: rgba(15, 23, 42, 0.65);
    --card-border: rgba(79, 195, 247, 0.2);
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif}
body{background:linear-gradient(135deg,var(--black) 0%,var(--black-light) 50%,var(--black-lighter) 100%);color:var(--light);min-height:100vh;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 85%, var(--primary-glow) 0%, transparent 60%),radial-gradient(circle at 85% 15%, var(--secondary-glow) 0%, transparent 60%);z-index:-1}
.page{max-width:520px;margin:0 auto;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:24px;padding:32px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:18px}
.brand-icon{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#0F172A;font-size:24px;font-weight:800}
.brand h1{font-size:1.9rem;color:var(--primary-light)}
.subtitle{text-align:center;color:var(--gray);margin-bottom:28px}
.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(79,195,247,.12);border:1px solid rgba(79,195,247,.24);color:var(--primary-light);font-weight:600;margin:0 auto 20px;}
.badge-wrap{text-align:center}
.form-group{margin-bottom:16px}
label{display:block;margin-bottom:8px;color:#dbe7f4;font-weight:600}
input, select{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(148,163,184,.25);background:rgba(15,23,42,.72);color:white;outline:none}
input:focus, select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,195,247,.15)}
.btn{width:100%;border:none;border-radius:14px;padding:14px 16px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#0F172A}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{margin-top:12px;background:transparent;color:var(--light);border:1px solid rgba(148,163,184,.25)}
.helper{text-align:center;color:var(--gray);font-size:.95rem;margin-top:18px}
.alert{display:none;margin-bottom:16px;padding:12px 14px;border-radius:12px;font-size:.95rem}
.alert.error{background:rgba(220,53,69,.15);border:1px solid rgba(220,53,69,.35);color:#ffb3bd}
.alert.success{background:rgba(25,135,84,.15);border:1px solid rgba(25,135,84,.35);color:#b4f1ca}
.links{display:flex;justify-content:space-between;gap:12px;margin-top:18px;flex-wrap:wrap}
.links a{color:var(--primary-light);text-decoration:none;font-weight:600}
.small{font-size:.9rem;color:var(--gray)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:18px;z-index:9999}
.modal.open{display:flex}
.modal-card{width:100%;max-width:560px;background:rgba(15,23,42,.92);border:1px solid var(--card-border);border-radius:22px;padding:24px;box-shadow:var(--shadow)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-header h2{color:var(--primary-light);font-size:1.3rem}
.icon-btn{background:transparent;border:none;color:#cbd5e1;font-size:1.1rem;cursor:pointer}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
@media (max-width: 560px){.modal-actions{grid-template-columns:1fr}.card,.modal-card{padding:22px}}
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand"><div class="brand-icon"><i class="fas fa-user"></i></div><h1>Kronos OS</h1></div>
      <div class="badge-wrap"><div class="badge"><i class="fas fa-user"></i> Acesso do Solicitante</div></div>
      <p class="subtitle">Acesso separado e dedicado para este perfil.</p>
      <div id="alert" class="alert error"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input id="senha" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary" id="btnEntrar" type="submit">Entrar</button>
        <button type="button" class="btn btn-secondary" id="btnCadastro">Criar conta de solicitante</button>
      </form>
      <div class="links">
        <a href="/">← Voltar ao início</a>
      </div>
      <p class="helper">Após o login, o sistema envia este perfil para a página correta automaticamente.</p>
    </div>
  </div>

  <div class="modal" id="cadastroModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2><i class="fas fa-user-plus"></i> Criar conta de solicitante</h2>
        <button class="icon-btn" type="button" id="fecharCadastro"><i class="fas fa-times"></i></button>
      </div>
      <div id="cadastroAlert" class="alert error"></div>
      <form id="cadastroForm">
        <div class="form-group">
          <label for="cadNome">Nome completo</label>
          <input id="cadNome" type="text" required>
        </div>
        <div class="form-group">
          <label for="cadEmail">Email</label>
          <input id="cadEmail" type="email" required>
        </div>
        <div class="form-group">
          <label for="cadSenha">Senha</label>
          <input id="cadSenha" type="password" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="cadSetor">Setor do solicitante</label>
          <select id="cadSetor" required>
            <option value="">Selecione o setor</option>
            <option value="Pronto Socorro">Pronto Socorro</option>
            <option value="Recepção">Recepção</option>
            <option value="Ambulatório">Ambulatório</option>
            <option value="Administrativo">Administrativo</option>
            <option value="RH">RH</option>
            <option value="Financeiro">Financeiro</option>
            <option value="Hotelaria">Hotelaria</option>
            <option value="Assistência Social">Assistência Social</option>
            <option value="Direção">Direção</option>
            <option value="Faturamento">Faturamento</option>
            <option value="Maternidade">Maternidade</option>
            <option value="Clínica Médica">Clínica Médica</option>
            <option value="Clínica Cirúrgica">Clínica Cirúrgica</option>
            <option value="Centro Cirúrgico">Centro Cirúrgico</option>
            <option value="Tomografia">Tomografia</option>
            <option value="Mamografia">Mamografia</option>
            <option value="HEMOPI">HEMOPI</option>
            <option value="Núcleos">Núcleos</option>
            <option value="UTI">UTI</option>
            <option value="Farmácia">Farmácia</option>
            <option value="Almoxarifado">Almoxarifado</option>
            <option value="Nutrição">Nutrição</option>
            <option value="Laboratório">Laboratório</option>
            <option value="Fisioterapia">Fisioterapia</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelarCadastro">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnSalvarCadastro">Criar conta</button>
        </div>
      </form>
    </div>
  </div>

<script>
const API_BASE_URL = window.location.origin;
const form = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const senhaInput = document.getElementById('senha');
const alertBox = document.getElementById('alert');
const btnEntrar = document.getElementById('btnEntrar');
const btnCadastro = document.getElementById('btnCadastro');
const cadastroModal = document.getElementById('cadastroModal');
const cadastroForm = document.getElementById('cadastroForm');
const cadastroAlert = document.getElementById('cadastroAlert');
const btnSalvarCadastro = document.getElementById('btnSalvarCadastro');

function showAlert(message, type='error', target=alertBox) {
  target.className = `alert ${type}`;
  target.textContent = message;
  target.style.display = 'block';
}

function hideAlert(target=alertBox) {
  target.style.display = 'none';
}

function clearAuth() {
  localStorage.removeItem('kronos_user');
  localStorage.removeItem('kronos_token');
  localStorage.removeItem('tecnico_setor_selecionado');
}

function isTech(user) {
  return user && (user.tipo === 'tecnico' || user.tipo === 'admin');
}

(function redirectIfLogged() {
  try {
    const user = JSON.parse(localStorage.getItem('kronos_user') || 'null');
    if (!user) return;
    if (!isTech(user)) {
      window.location.href = '/solicitante-dashboard';
    }
  } catch (_) {}
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert(alertBox);
  btnEntrar.disabled = true;
  btnEntrar.textContent = 'Entrando...';
  try {
    const response = await fetch(`${API_BASE_URL}/api/usuarios/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: emailInput.value.trim(), senha: senhaInput.value })
    });
    const data = await response.json();
    if (!response.ok || !data.success) throw new Error(data.message || 'Falha no login');
    const user = data.user;
    if (isTech(user)) {
      clearAuth();
      showAlert('Este acesso é exclusivo para solicitantes.', 'error');
      return;
    }
    localStorage.setItem('kronos_user', JSON.stringify(user));
    localStorage.setItem('kronos_token', data.token);
    window.location.href = '/solicitante-dashboard';
  } catch (error) {
    showAlert(error.message || 'Erro de conexão.', 'error');
  } finally {
    btnEntrar.disabled = false;
    btnEntrar.textContent = 'Entrar';
  }
});

function abrirCadastro() {
  cadastroForm.reset();
  hideAlert(cadastroAlert);
  cadastroModal.classList.add('open');
}

function fecharCadastro() {
  cadastroModal.classList.remove('open');
}

btnCadastro.addEventListener('click', abrirCadastro);
document.getElementById('fecharCadastro').addEventListener('click', fecharCadastro);
document.getElementById('cancelarCadastro').addEventListener('click', fecharCadastro);
cadastroModal.addEventListener('click', (e) => {
  if (e.target === cadastroModal) fecharCadastro();
});

cadastroForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert(cadastroAlert);
  btnSalvarCadastro.disabled = true;
  btnSalvarCadastro.textContent = 'Criando...';
  try {
    const payload = {
      nome: document.getElementById('cadNome').value.trim(),
      email: document.getElementById('cadEmail').value.trim(),
      senha: document.getElementById('cadSenha').value,
      setor: document.getElementById('cadSetor').value,
      tipo: 'solicitante'
    };

    const response = await fetch(`${API_BASE_URL}/api/usuarios`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await response.json();
    if (!response.ok || !data.success) throw new Error(data.message || 'Erro ao criar conta');

    showAlert('Conta criada com sucesso. Agora faça login.', 'success');
    emailInput.value = payload.email;
    senhaInput.value = '';
    fecharCadastro();
  } catch (error) {
    showAlert(error.message || 'Erro ao criar conta.', 'error', cadastroAlert);
  } finally {
    btnSalvarCadastro.disabled = false;
    btnSalvarCadastro.textContent = 'Criar conta';
  }
});
</script>
</body>
</html>
